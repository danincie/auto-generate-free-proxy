<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Generate Free Proxy</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased">
    <div class="max-w-5xl mx-auto p-6 mt-10">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-green-400 mb-2">Live Free Proxies</h1>
            <p class="text-gray-400">Scraped and verified automatically.</p>
            <div class="mt-4 inline-block bg-gray-800 px-4 py-2 rounded-lg text-sm shadow border border-gray-700">
                Status: <span id="activeCount" class="text-green-400 font-bold">Loading...</span> | 
                Last Update: <span id="lastUpdated" class="text-yellow-400">Loading...</span>
            </div>
        </header>

        <div class="bg-gray-800 p-4 rounded-lg mb-6 border border-gray-700 shadow-md flex flex-col md:flex-row gap-4 justify-between items-center">
            <div class="w-full md:w-1/2">
                <label class="block text-xs text-gray-400 mb-1 uppercase font-semibold tracking-wider">Search Proxy</label>
                <input type="text" id="searchBar" oninput="applyFilters()" placeholder="Search by IP, Port, or Country..." class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-indigo-500 transition">
            </div>
            <div class="w-full md:w-1/4">
                <label class="block text-xs text-gray-400 mb-1 uppercase font-semibold tracking-wider">Anonymity</label>
                <select id="filterAnon" aria-label="Filter by Anonymity Level" onchange="applyFilters()" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-500 transition">
                    <option value="all">All Levels</option>
                    <option value="Elite">Elite (High Anon)</option>
                    <option value="Anonymous">Anonymous</option>
                    <option value="Transparent">Transparent</option>
                </select>
            </div>
            <div class="w-full md:w-1/4">
                <label class="block text-xs text-gray-400 mb-1 uppercase font-semibold tracking-wider">Country</label>
                <select id="filterCountry" aria-label="Filter by Country" onchange="applyFilters()" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-500 transition">
                    <option value="all">All Countries</option>
                </select>
            </div>
        </div>

        <div class="bg-gray-800 shadow-xl rounded-lg overflow-hidden border border-gray-700">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-750 text-gray-300 text-sm uppercase tracking-wide border-b border-gray-600">
                        <th class="px-6 py-4 font-semibold text-center w-24">Location</th>
                        <th class="px-6 py-4 font-semibold">IP Address : Port</th>
                        <th class="px-6 py-4 font-semibold text-center w-36">Anonymity</th>
                        <th class="px-6 py-4 font-semibold text-center w-36">Latency (ms)</th>
                        <th class="px-6 py-4 font-semibold text-center w-28">Action</th>
                    </tr>
                </thead>
                <tbody id="proxyTableBody" class="divide-y divide-gray-700">
                    <tr>
                        <td colspan="5" class="px-6 py-8 text-center text-gray-500">
                            <div class="animate-pulse">Fetching proxy data...</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let allProxies = []; // Tempat menyimpan data master proxy

        async function fetchProxies() {
            try {
                const response = await fetch('working_proxies.json?v=' + new Date().getTime());
                const data = await response.json();

                document.getElementById('lastUpdated').textContent = data.last_updated;
                document.getElementById('activeCount').textContent = `${data.total_active} Active Proxies`;

                allProxies = data.proxies;
                
                populateCountryDropdown(allProxies);
                renderTable(allProxies);
            } catch (error) {
                document.getElementById('proxyTableBody').innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-red-500">Error loading proxy data. Ensure JSON file is generated.</td></tr>`;
            }
        }

        // Mengisi pilihan negara secara dinamis berdasarkan data yang ada
        function populateCountryDropdown(proxies) {
            const countrySelect = document.getElementById('filterCountry');
            const countries = new Set();

            proxies.forEach(item => {
                if (item.country) countries.add(item.country);
            });

            // Urutkan negara berdasarkan abjad
            Array.from(countries).sort().forEach(country => {
                const option = document.createElement('option');
                option.value = country;
                option.textContent = country;
                countrySelect.appendChild(option);
            });
        }

        // Fungsi khusus murni untuk merender ulang baris tabel DOM
        function renderTable(proxies) {
            const tableBody = document.getElementById('proxyTableBody');
            tableBody.innerHTML = '';

            if (proxies.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">No proxies match your filter criteria.</td></tr>`;
                return;
            }

            proxies.forEach(item => {
                let latencyColor = 'text-green-400';
                if (item.latency_ms > 1000) latencyColor = 'text-yellow-400';
                if (item.latency_ms > 2000) latencyColor = 'text-red-400';

                let anonColor = 'text-gray-400';
                let anonText = item.anonymity || 'Unknown';
                if (anonText === 'Elite') anonColor = 'text-purple-400 font-bold';
                if (anonText === 'Anonymous') anonColor = 'text-blue-400 font-semibold';
                if (anonText === 'Transparent') anonColor = 'text-orange-400';

                const countryCode = item.country_code ? item.country_code.toLowerCase() : 'un';
                const countryName = item.country || 'Unknown';
                
                let flagHtml = `<span class="text-gray-500 text-xs">Unknown</span>`;
                if (countryCode !== 'un') {
                    flagHtml = `<img src="https://flagcdn.com/24x18/${countryCode}.png" alt="${countryName}" title="${countryName}" class="inline-block rounded shadow-sm">`;
                }

                const row = `
                    <tr class="hover:bg-gray-750 transition duration-150">
                        <td class="px-6 py-4 text-center" title="${countryName}">
                            ${flagHtml}
                        </td>
                        <td class="px-6 py-4 font-mono text-sm text-gray-200">${item.proxy}</td>
                        <td class="px-6 py-4 text-center text-xs ${anonColor}">${anonText}</td>
                        <td class="px-6 py-4 text-center font-mono text-sm ${latencyColor}">${item.latency_ms} ms</td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="copyToClipboard('${item.proxy}')" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs py-1.5 px-3 rounded shadow transition duration-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-opacity-50">
                                Copy IP
                                </button>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        }

        // Fungsi Filter Utama (Dipicu setiap kali input pengguna berubah)
        function applyFilters() {
            const searchQuery = document.getElementById('searchBar').value.toLowerCase();
            const selectedAnon = document.getElementById('filterAnon').value;
            const selectedCountry = document.getElementById('filterCountry').value;

            const filtered = allProxies.filter(item => {
                const matchesSearch = item.proxy.toLowerCase().includes(searchQuery) || 
                                      (item.country && item.country.toLowerCase().includes(searchQuery));
                
                const matchesAnon = selectedAnon === 'all' || item.anonymity === selectedAnon;
                
                const matchesCountry = selectedCountry === 'all' || item.country === selectedCountry;

                return matchesSearch && matchesAnon && matchesCountry;
            });

            renderTable(filtered);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert(`Proxy Copied: ${text}`);
            });
        }

        fetchProxies();
    </script>
</body>
</html>
