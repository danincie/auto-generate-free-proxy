<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Generate Free Proxy</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased">
    <div class="max-w-6xl mx-auto p-6 mt-10">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-green-400 mb-2">Live Multi-Protocol Proxies</h1>
            <p class="text-gray-400">HTTP, SOCKS4, and SOCKS5 scraped automatically.</p>
            <div class="mt-4 inline-block bg-gray-800 px-4 py-2 rounded-lg text-sm shadow border border-gray-700">
                Status: <span id="activeCount" class="text-green-400 font-bold">Loading...</span> | 
                Last Update: <span id="lastUpdated" class="text-yellow-400">Loading...</span>
            </div>
        </header>

        <div class="bg-gray-800 p-4 rounded-lg mb-6 border border-gray-700 shadow-md grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
            <div>
                <label class="block text-xs text-gray-400 mb-1 uppercase font-semibold">Search Proxy</label>
                <input type="text" id="searchBar" oninput="applyFilters()" placeholder="IP or Country..." class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1 uppercase font-semibold">Protocol</label>
                <select id="filterProto" aria-label="Filter by Protocol" onchange="applyFilters()" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-500">
                    <option value="all">All Protocols</option>
                    <option value="HTTP">HTTP</option>
                    <option value="SOCKS4">SOCKS4</option>
                    <option value="SOCKS5">SOCKS5</option>
                </select>
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1 uppercase font-semibold">Anonymity</label>
                <select id="filterAnon" aria-label="Filter by Anonymity Level" onchange="applyFilters()" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-500">
                    <option value="all">All Levels</option>
                    <option value="Elite">Elite</option>
                    <option value="Anonymous">Anonymous</option>
                    <option value="Transparent">Transparent</option>
                </select>
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1 uppercase font-semibold">Country</label>
                <select id="filterCountry" aria-label="Filter by Country" onchange="applyFilters()" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-500">
                    <option value="all">All Countries</option>
                </select>
            </div>
        </div>

        <div class="bg-gray-800 shadow-xl rounded-lg overflow-hidden border border-gray-700">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-750 text-gray-300 text-sm uppercase tracking-wide border-b border-gray-600">
                        <th class="px-6 py-4 font-semibold text-center w-24">Location</th>
                        <th class="px-6 py-4 font-semibold">IP Address : Port</th>
                        <th class="px-6 py-4 font-semibold text-center">Protocol</th>
                        <th class="px-6 py-4 font-semibold text-center">Anonymity</th>
                        <th class="px-6 py-4 font-semibold text-center">Latency</th>
                        <th class="px-6 py-4 font-semibold text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="proxyTableBody" class="divide-y divide-gray-700">
                    <tr>
                        <td colspan="6" class="px-6 py-8 text-center text-gray-500">
                            <div class="animate-pulse">Fetching proxy data...</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center mt-4 mb-8 text-sm text-gray-400">
            <div id="pageInfo" class="mb-4 md:mb-0">
                Showing <span class="font-bold text-gray-200">0</span> to <span class="font-bold text-gray-200">0</span> of <span class="font-bold text-gray-200">0</span> proxies
            </div>
            <div class="flex gap-2">
                <button id="prevBtn" onclick="prevPage()" class="bg-gray-800 hover:bg-gray-700 text-gray-300 font-semibold py-2 px-4 border border-gray-600 rounded shadow transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                    &larr; Previous
                </button>
                <button id="nextBtn" onclick="nextPage()" class="bg-gray-800 hover:bg-gray-700 text-gray-300 font-semibold py-2 px-4 border border-gray-600 rounded shadow transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                    Next &rarr;
                </button>
            </div>
        </div>
    </div>

    <script>
        let allProxies = [];
        let currentFiltered = [];
        
        // Konfigurasi Halaman
        let currentPage = 1;
        const ITEMS_PER_PAGE = 25; // Maksimal 25 proxy per halaman

        async function fetchProxies() {
            try {
                const response = await fetch('working_proxies.json?v=' + new Date().getTime());
                const data = await response.json();

                document.getElementById('lastUpdated').textContent = data.last_updated;
                document.getElementById('activeCount').textContent = `${data.total_active} Active Proxies`;

                allProxies = data.proxies;
                populateCountryDropdown(allProxies);
                
                applyFilters(); // Render pertama kali
            } catch (error) {
                document.getElementById('proxyTableBody').innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-red-500">Error loading data.</td></tr>`;
            }
        }

        function populateCountryDropdown(proxies) {
            const countrySelect = document.getElementById('filterCountry');
            const countries = new Set();
            proxies.forEach(item => { if (item.country) countries.add(item.country); });
            Array.from(countries).sort().forEach(country => {
                const option = document.createElement('option');
                option.value = country;
                option.textContent = country;
                countrySelect.appendChild(option);
            });
        }

        function applyFilters() {
            const search = document.getElementById('searchBar').value.toLowerCase();
            const fProto = document.getElementById('filterProto').value;
            const fAnon = document.getElementById('filterAnon').value;
            const fCountry = document.getElementById('filterCountry').value;

            currentFiltered = allProxies.filter(item => {
                const protoStr = item.protocol || 'HTTP';
                return (item.proxy.toLowerCase().includes(search) || (item.country && item.country.toLowerCase().includes(search))) &&
                       (fProto === 'all' || protoStr === fProto) &&
                       (fAnon === 'all' || item.anonymity === fAnon) &&
                       (fCountry === 'all' || item.country === fCountry);
            });

            // Wajib reset ke halaman 1 setiap kali pengguna mengganti filter/mencari
            currentPage = 1; 
            renderTable();
        }

        function renderTable() {
            const tableBody = document.getElementById('proxyTableBody');
            const totalItems = currentFiltered.length;
            const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);

            // Menghitung indeks potongan array untuk halaman saat ini
            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const endIndex = Math.min(startIndex + ITEMS_PER_PAGE, totalItems);
            
            // Mengambil hanya 25 data sesuai halaman
            const proxiesToShow = currentFiltered.slice(startIndex, endIndex);
            
            let htmlContent = '';

            if (proxiesToShow.length === 0) {
                htmlContent = `<tr><td colspan="6" class="px-6 py-8 text-center text-gray-500">No proxies match criteria.</td></tr>`;
            } else {
                proxiesToShow.forEach(item => {
                    let latencyColor = 'text-green-400';
                    if (item.latency_ms > 1000) latencyColor = 'text-yellow-400';
                    if (item.latency_ms > 2000) latencyColor = 'text-red-400';

                    let anonColor = 'text-gray-400';
                    let anonText = item.anonymity || 'Unknown';
                    if (anonText === 'Elite') anonColor = 'text-purple-400 font-bold';
                    if (anonText === 'Anonymous') anonColor = 'text-blue-400 font-semibold';
                    if (anonText === 'Transparent') anonColor = 'text-orange-400';

                    let protoColor = 'text-gray-400';
                    let protoText = item.protocol || 'HTTP';
                    if (protoText === 'SOCKS5') protoColor = 'text-pink-400 font-bold';
                    if (protoText === 'SOCKS4') protoColor = 'text-teal-400 font-semibold';

                    const countryCode = item.country_code ? item.country_code.toLowerCase() : 'un';
                    const countryName = item.country || 'Unknown';
                    let flagHtml = countryCode !== 'un' ? `<img src="https://flagcdn.com/24x18/${countryCode}.png" alt="${countryName}" title="${countryName}" class="inline-block rounded shadow-sm">` : `<span class="text-gray-500 text-xs">Unk</span>`;

                    const copyText = `${protoText.toLowerCase()}://${item.proxy}`;

                    htmlContent += `
                        <tr class="hover:bg-gray-750 transition duration-150">
                            <td class="px-6 py-4 text-center" title="${countryName}">${flagHtml}</td>
                            <td class="px-6 py-4 font-mono text-sm text-gray-200">${item.proxy}</td>
                            <td class="px-6 py-4 text-center text-xs ${protoColor}">${protoText}</td>
                            <td class="px-6 py-4 text-center text-xs ${anonColor}">${anonText}</td>
                            <td class="px-6 py-4 text-center font-mono text-sm ${latencyColor}">${item.latency_ms} ms</td>
                            <td class="px-6 py-4 text-center">
                                <button onclick="copyToClipboard('${copyText}')" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs py-1.5 px-3 rounded shadow">Copy IP</button>
                            </td>
                        </tr>
                    `;
                });
            }

            tableBody.innerHTML = htmlContent;

            // Memperbarui teks info halaman dan status tombol Next/Prev
            const displayStart = totalItems > 0 ? startIndex + 1 : 0;
            document.getElementById('pageInfo').innerHTML = `Showing <span class="font-bold text-gray-200">${displayStart}</span> to <span class="font-bold text-gray-200">${endIndex}</span> of <span class="font-bold text-gray-200">${totalItems}</span> proxies`;

            // Matikan tombol jika berada di ujung halaman
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages || totalPages === 0;
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                renderTable();
            }
        }

        function nextPage() {
            const totalPages = Math.ceil(currentFiltered.length / ITEMS_PER_PAGE);
            if (currentPage < totalPages) {
                currentPage++;
                renderTable();
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => { alert(`Proxy Copied: ${text}`); });
        }

        fetchProxies();
    </script>
</body>
</html>
